server:
  port: 8081

spring:
  application:
    name: devmind-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DEVMIND_DB_URL:jdbc:mysql://localhost:3306/devmind?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DEVMIND_DB_USERNAME:root}
    password: ${DEVMIND_DB_PASSWORD:root}
  flyway:
    enabled: ${DEVMIND_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: existing schema baseline
  data:
    redis:
      host: ${DEVMIND_REDIS_HOST:localhost}
      port: ${DEVMIND_REDIS_PORT:6379}
      database: ${DEVMIND_REDIS_DATABASE:1}
      password: ${DEVMIND_REDIS_PASSWORD:}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

springdoc:
  swagger-ui:
    path: /swagger-ui.html

devmind:
  security:
    jwt-secret: ${DEVMIND_JWT_SECRET:devmind-local-secret-change-me-devmind-local-secret}
    token-expire-seconds: ${DEVMIND_TOKEN_EXPIRE_SECONDS:7200}
    # true: a Redis failure only disables logout revocation (local-dev friendly).
    # false: reject requests whenever the blacklist cannot be checked.
    blacklist-fail-open: ${DEVMIND_BLACKLIST_FAIL_OPEN:true}
  retrieval:
    # Curated tech-phrase extraction for query understanding. Disable to measure
    # how much retrieval quality depends on the hand-written phrase list.
    tech-phrases-enabled: ${DEVMIND_RETRIEVAL_TECH_PHRASES_ENABLED:true}
  vector-store:
    # mysql-json (default): dense vectors stay as JSON rows in MySQL, brute-force cosine.
    # pgvector: dense vectors are double-written to Postgres and served by an HNSW index.
    provider: ${DEVMIND_VECTOR_STORE_PROVIDER:mysql-json}
    pgvector:
      url: ${DEVMIND_PGVECTOR_URL:jdbc:postgresql://localhost:5433/devmind_vectors}
      username: ${DEVMIND_PGVECTOR_USERNAME:devmind}
      password: ${DEVMIND_PGVECTOR_PASSWORD:devmind}
      # Must match the dense embedding dimension. pgvector's HNSW index caps the
      # vector type at 2000 dims, so the remote embedding is requested at 1024.
      dimension: ${DEVMIND_PGVECTOR_DIMENSION:1024}
  ai:
    provider: ${DEVMIND_AI_PROVIDER:mock}
    deepseek-api-key: ${DEVMIND_DEEPSEEK_API_KEY:}
    deepseek-base-url: ${DEVMIND_DEEPSEEK_BASE_URL:https://api.deepseek.com}
    deepseek-model: ${DEVMIND_DEEPSEEK_MODEL:deepseek-v4-flash}
    deepseek-temperature: ${DEVMIND_DEEPSEEK_TEMPERATURE:0.2}
    embedding:
      provider: ${DEVMIND_AI_EMBEDDING_PROVIDER:local-sparse-vector}
      remote:
        base-url: ${DEVMIND_AI_EMBEDDING_REMOTE_BASE_URL:}
        api-key: ${DEVMIND_AI_EMBEDDING_REMOTE_API_KEY:}
        model: ${DEVMIND_AI_EMBEDDING_REMOTE_MODEL:}
        dimension: ${DEVMIND_AI_EMBEDDING_REMOTE_DIMENSION:0}
    rerank:
      provider: ${DEVMIND_AI_RERANK_PROVIDER:none}
      remote:
        base-url: ${DEVMIND_AI_RERANK_REMOTE_BASE_URL:}
        api-key: ${DEVMIND_AI_RERANK_REMOTE_API_KEY:}
        model: ${DEVMIND_AI_RERANK_REMOTE_MODEL:}
